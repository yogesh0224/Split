<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Invites • Splitly</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body class="bg-zinc-950 text-white">

  <!-- NAVBAR -->
  <nav class="fixed top-0 w-full bg-zinc-950/95 backdrop-blur-2xl border-b border-white/10 z-50">
    <div class="max-w-7xl mx-auto px-6 py-5 flex justify-between items-center">
      <a href="index.html" class="flex items-center gap-3">
        <i class="fas fa-handshake text-4xl text-violet-500"></i>
        <span class="text-3xl font-bold tracking-tighter">Splitly</span>
      </a>

      <div class="hidden md:flex gap-10 text-sm font-medium">
        <a href="index.html" class="hover:text-violet-400">Home</a>
        <a href="dashboard.html" class="hover:text-violet-400">Dashboard</a>
        <a href="invites.html" class="text-violet-400 font-semibold">Invites</a>
      </div>

      <div class="flex items-center gap-6">
        <span id="currentUserDisplay" class="text-sm font-medium hidden md:block"></span>
        <button onclick="logout()" class="text-xs bg-white/10 px-5 py-2 rounded-2xl hover:bg-white/20">Logout</button>
        <button onclick="toggleMobileMenu()" class="md:hidden text-3xl"><i class="fas fa-bars"></i></button>
      </div>
    </div>

    <!-- Mobile Sliding Menu -->
    <div id="mobileMenu" class="hidden fixed inset-0 bg-black/70 z-[60] flex justify-end">
      <div onclick="event.stopImmediatePropagation()" class="bg-zinc-900 w-80 h-full shadow-2xl transform translate-x-full transition-transform duration-300 flex flex-col">
        <div class="p-6 border-b border-white/10 flex justify-between items-center">
          <div class="flex items-center gap-3">
            <i class="fas fa-handshake text-3xl text-violet-500"></i>
            <span class="text-2xl font-bold">Splitly</span>
          </div>
          <button onclick="toggleMobileMenu()" class="text-3xl text-zinc-400"><i class="fas fa-times"></i></button>
        </div>
        <div class="flex-1 p-6 space-y-6 text-lg">
          <a href="index.html" onclick="toggleMobileMenu()" class="flex items-center gap-4">Home</a>
          <a href="dashboard.html" onclick="toggleMobileMenu()" class="flex items-center gap-4">Dashboard</a>
          <a href="invites.html" onclick="toggleMobileMenu()" class="flex items-center gap-4">Invites</a>
        </div>
        <div class="p-6 border-t border-white/10">
          <button onclick="logout()" class="w-full py-4 bg-red-600 rounded-3xl font-medium">Logout</button>
        </div>
      </div>
    </div>
  </nav>

  <!-- TOAST -->
  <div id="toast" class="hidden fixed bottom-6 right-6 bg-emerald-600 text-white px-6 py-4 rounded-3xl shadow-2xl flex items-center gap-3 z-50">
    <i class="fas fa-check-circle"></i>
    <span id="toastMessage" class="font-medium"></span>
  </div>

  <div class="max-w-4xl mx-auto px-6 pt-28">
    <h1 class="text-5xl font-bold mb-10">Pending Invitations</h1>
    <div id="invitesContainer" class="space-y-6"></div>
  </div>

  <script>
    const currentUser = localStorage.getItem('currentUser');
    document.getElementById('currentUserDisplay').textContent = currentUser;
    document.getElementById('currentUserDisplay').classList.remove('hidden');

    function showToast(msg) {
      const toast = document.getElementById('toast');
      document.getElementById('toastMessage').textContent = msg;
      toast.classList.remove('hidden');
      setTimeout(() => toast.classList.add('hidden'), 3000);
    }

    function toggleMobileMenu() {
      const menu = document.getElementById('mobileMenu');
      const drawer = menu.querySelector('div');
      if (menu.classList.contains('hidden')) {
        menu.classList.remove('hidden');
        setTimeout(() => drawer.style.transform = 'translateX(0)', 10);
      } else {
        drawer.style.transform = 'translateX(100%)';
        setTimeout(() => menu.classList.add('hidden'), 300);
      }
    }

    function logout() {
      localStorage.removeItem('currentUser');
      window.location.href = "index.html";
    }

    function loadInvites() {
      let allInvites = JSON.parse(localStorage.getItem('allInvites') || '{}');
      let myInvites = allInvites[currentUser] || [];
      const container = document.getElementById('invitesContainer');

      container.innerHTML = '';

      if (myInvites.length === 0) {
        container.innerHTML = `
          <div class="bg-zinc-900 rounded-3xl p-16 text-center">
            <i class="fas fa-inbox text-7xl text-zinc-600 mb-6"></i>
            <p class="text-2xl text-zinc-400">No pending invitations</p>
          </div>`;
        return;
      }

      myInvites.forEach((invite, index) => {
        const card = document.createElement('div');
        card.className = "bg-zinc-900 rounded-3xl p-8 flex justify-between items-center";
        card.innerHTML = `
          <div>
            <h3 class="text-2xl font-semibold">${invite.title}</h3>
            <p class="text-zinc-400">Invited by <span class="text-violet-400">${invite.from}</span></p>
          </div>
          <button onclick="acceptInvite(${index})" class="bg-emerald-600 hover:bg-emerald-500 px-10 py-4 rounded-3xl font-semibold">Accept</button>
        `;
        container.appendChild(card);
      });

      // New: Push notification if invites
      if (myInvites.length > 0 && 'Notification' in window && Notification.permission === 'granted') {
        new Notification('Splitly: Pending Invites', {body: `You have ${myInvites.length} new invites`});
      }
    }

    function acceptInvite(index) {
      let allInvites = JSON.parse(localStorage.getItem('allInvites') || '{}');
      let myInvites = allInvites[currentUser] || [];
      const invite = myInvites[index];

      let groups = JSON.parse(localStorage.getItem('groups') || '[]');
      const group = groups.find(g => g.id === invite.id);
      if (group) {
        group.members.push({ user: currentUser, accepted: true });
        // Log timeline if exists
        if (!group.timeline) group.timeline = [];
        group.timeline.push({action: `${currentUser} accepted invite`, by: currentUser, timestamp: Date.now()});
        localStorage.setItem('groups', JSON.stringify(groups));
      }

      myInvites.splice(index, 1);
      allInvites[currentUser] = myInvites;
      localStorage.setItem('allInvites', JSON.stringify(allInvites));

      showToast("Invite accepted! Redirecting...");
      setTimeout(() => window.location.href = `split-detail.html?id=${invite.id}`, 1500);
    }

    loadInvites();
  </script>
</body>
</html>
