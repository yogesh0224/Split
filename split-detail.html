<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Split Detail • Splitly</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <!-- PDF Export Library -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <style>
    .border-red-500 { border-color: red !important; }
  </style>
</head>
<body class="bg-zinc-950 text-white">

  <!-- NAVBAR -->
  <nav class="fixed top-0 w-full bg-zinc-950/95 backdrop-blur-2xl border-b border-white/10 z-50">
    <div class="max-w-7xl mx-auto px-6 py-5 flex justify-between items-center">
      <a href="index.html" class="flex items-center gap-3">
        <i class="fas fa-handshake text-4xl text-violet-500"></i>
        <span class="text-3xl font-bold tracking-tighter">Splitly</span>
      </a>
      <a href="dashboard.html" class="text-sm font-medium">← Dashboard</a>
      <button onclick="toggleMobileMenu()" class="md:hidden text-3xl"><i class="fas fa-bars"></i></button>
      <button onclick="showHelp()" class="text-2xl ml-4"><i class="fas fa-question-circle"></i></button>
    </div>

    <!-- Mobile Sliding Menu -->
    <div id="mobileMenu" class="hidden fixed inset-0 bg-black/70 z-[60] flex justify-end">
      <div onclick="event.stopImmediatePropagation()" class="bg-zinc-900 w-80 h-full shadow-2xl transform translate-x-full transition-transform duration-300 flex flex-col">
        <div class="p-6 border-b border-white/10 flex justify-between items-center">
          <div class="flex items-center gap-3">
            <i class="fas fa-handshake text-3xl text-violet-500"></i>
            <span class="text-2xl font-bold">Splitly</span>
          </div>
          <button onclick="toggleMobileMenu()" class="text-3xl text-zinc-400"><i class="fas fa-times"></i></button>
        </div>
        <div class="flex-1 p-6 space-y-6 text-lg">
          <a href="index.html" onclick="toggleMobileMenu()" class="flex items-center gap-4">Home</a>
          <a href="dashboard.html" onclick="toggleMobileMenu()" class="flex items-center gap-4">Dashboard</a>
          <a href="invites.html" onclick="toggleMobileMenu()" class="flex items-center gap-4">Invites</a>
        </div>
        <div class="p-6 border-t border-white/10">
          <button onclick="logout()" class="w-full py-4 bg-red-600 rounded-3xl font-medium">Logout</button>
        </div>
      </div>
    </div>
  </nav>

  <!-- TOAST -->
  <div id="toast" class="hidden fixed bottom-6 right-6 bg-emerald-600 text-white px-6 py-4 rounded-3xl shadow-2xl flex items-center gap-3 z-50">
    <i class="fas fa-check-circle"></i>
    <span id="toastMessage" class="font-medium"></span>
  </div>

  <!-- FLAG MODAL -->
  <div id="flagModal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
    <div class="bg-zinc-900 rounded-3xl p-8 max-w-md w-full mx-4">
      <h3 class="text-xl font-semibold mb-4">Flag Expense</h3>
      <select id="flagReason" class="w-full bg-zinc-800 border border-white/10 rounded-2xl px-6 py-4 mb-4 focus:outline-none focus:border-red-500">
        <option value="">Select a common reason</option>
        <option value="Amount too high">Amount too high</option>
        <option value="Not agreed upon">Not agreed upon</option>
        <option value="Duplicate entry">Duplicate entry</option>
      </select>
      <textarea id="flagRemark" rows="4" placeholder="Additional details (visible to everyone)" class="w-full bg-zinc-800 border border-white/10 rounded-2xl px-6 py-4 focus:outline-none focus:border-red-500"></textarea>
      <div class="flex gap-4 mt-8">
        <button onclick="closeFlagModal()" class="flex-1 py-4 rounded-3xl border border-white/20 font-medium">Cancel</button>
        <button onclick="submitFlag()" class="flex-1 py-4 rounded-3xl bg-red-600 font-medium">Flag Expense</button>
      </div>
    </div>
  </div>

  <!-- ADD EXPENSE MODAL -->
  <div id="addModal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
    <div class="bg-zinc-900 rounded-3xl p-8 max-w-md w-full mx-4">
      <h3 class="text-xl font-semibold mb-6">Add New Expense</h3>
      <div class="space-y-6">
        <input id="name" type="text" placeholder="e.g., Groceries, Rent, or any custom title" class="w-full bg-zinc-800 border border-white/10 rounded-2xl px-6 py-4 focus:outline-none focus:border-violet-500" autofocus>
        <input id="amount" type="number" placeholder="e.g., 5000" class="w-full bg-zinc-800 border border-white/10 rounded-2xl px-6 py-4 focus:outline-none focus:border-violet-500">
        <input id="date" type="date" class="w-full bg-zinc-800 border border-white/10 rounded-2xl px-6 py-4 focus:outline-none focus:border-violet-500" value="${new Date().toISOString().split('T')[0]}">
        <button onclick="addExpense()" class="w-full bg-violet-600 hover:bg-violet-500 py-4 rounded-3xl font-medium">Add Expense</button>
      </div>
    </div>
  </div>

  <!-- ADD RECURRING MODAL -->
  <div id="recurringModal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
    <div class="bg-zinc-900 rounded-3xl p-8 max-w-md w-full mx-4">
      <h3 class="text-xl font-semibold mb-6">Add Recurring Expense</h3>
      <div class="space-y-6">
        <input id="recName" type="text" placeholder="e.g., Monthly Rent or any custom title" class="w-full bg-zinc-800 border border-white/10 rounded-2xl px-6 py-4 focus:outline-none focus:border-violet-500" autofocus>
        <input id="recAmount" type="number" placeholder="e.g., 15000" class="w-full bg-zinc-800 border border-white/10 rounded-2xl px-6 py-4 focus:outline-none focus:border-violet-500">
        <select id="recFreq" class="w-full bg-zinc-800 border border-white/10 rounded-2xl px-6 py-4 focus:outline-none focus:border-violet-500">
          <option value="weekly">Weekly</option>
          <option value="monthly">Monthly</option>
        </select>
        <input id="recNextDate" type="date" class="w-full bg-zinc-800 border border-white/10 rounded-2xl px-6 py-4 focus:outline-none focus:border-violet-500">
        <button onclick="addRecurring()" class="w-full bg-violet-600 hover:bg-violet-500 py-4 rounded-3xl font-medium">Add Recurring</button>
      </div>
    </div>
  </div>

  <div class="max-w-6xl mx-auto px-6 pt-28 pb-20">
    <!-- HEADER -->
    <div id="headerInfo" class="mb-12 flex justify-between items-start">
      <!-- Dynamic content added via JS -->
    </div>

    <!-- Split Type Toggle -->
    <div class="flex justify-center mb-10 bg-zinc-900 rounded-3xl p-1 w-fit mx-auto">
      <button onclick="toggleSplitType(0)" id="typeBtn0" class="tab-btn px-8 py-3 rounded-3xl font-medium">One-time Split</button>
      <button onclick="toggleSplitType(1)" id="typeBtn1" class="tab-btn px-8 py-3 rounded-3xl font-medium">Ongoing (Flatmates)</button>
    </div>

    <!-- TABS -->
    <div class="flex border-b border-white/10 mb-10 overflow-x-auto">
      <button onclick="switchTab(0)" id="tab0" class="tab-btn active px-8 py-4 font-semibold border-b-2 border-violet-500">Expenses</button>
      <button onclick="switchTab(1)" id="tab1" class="tab-btn px-8 py-4 font-semibold">Summary</button>
      <button onclick="switchTab(2)" id="tab2" class="tab-btn px-8 py-4 font-semibold">Members & Shares</button>
      <button onclick="switchTab(3)" id="tab3" class="tab-btn px-8 py-4 font-semibold">Timeline</button>
    </div>

    <!-- EXPENSES TAB -->
    <div id="content0" class="tab-content">
      <div class="flex justify-between mb-8">
        <h2 class="text-3xl font-bold">Expenses</h2>
        <div class="flex gap-4">
          <button onclick="openAddModal()" class="bg-violet-600 hover:bg-violet-500 px-8 py-4 rounded-3xl font-medium">Add Expense</button>
          <button onclick="openRecurringModal()" class="bg-violet-600 hover:bg-violet-500 px-8 py-4 rounded-3xl font-medium">Add Recurring</button>
        </div>
      </div>
      <div id="expensesList" class="space-y-4">
        <!-- Dynamic content -->
      </div>
    </div>

    <!-- SUMMARY TAB -->
    <div id="content1" class="tab-content hidden">
      <h2 class="text-3xl font-bold mb-8">Summary</h2>
      <div id="summaryContainer" class="space-y-4"></div>
    </div>

    <!-- MEMBERS TAB -->
    <div id="content2" class="tab-content hidden">
      <h2 class="text-3xl font-bold mb-8">Members & Shares</h2>
      <div class="mb-8">
        <input id="inviteUsername" placeholder="Username to invite" class="w-full max-w-md bg-zinc-800 border border-white/10 rounded-2xl px-6 py-4 focus:outline-none focus:border-violet-500">
        <button onclick="sendInvite()" class="mt-4 bg-emerald-600 hover:bg-emerald-500 px-8 py-4 rounded-3xl font-medium">Send Invite</button>
      </div>
      <div id="membersList" class="space-y-4"></div>
    </div>

    <!-- TIMELINE TAB -->
    <div id="content3" class="tab-content hidden">
      <h2 class="text-3xl font-bold mb-8">Timeline</h2>
      <div class="flex gap-4 mb-8">
        <input id="timelineSearch" placeholder="Search timeline..." class="flex-1 bg-zinc-800 border border-white/10 rounded-2xl px-6 py-4">
        <select id="timelineFilter" class="bg-zinc-800 border border-white/10 rounded-2xl px-6 py-4">
          <option value="all">All</option>
          <option value="member">My Actions</option>
        </select>
      </div>
      <div id="timelineList" class="space-y-4"></div>
    </div>

  </div>

  <script>
    const currentUser = localStorage.getItem('currentUser');
    const urlParams = new URLSearchParams(window.location.search);
    const groupId = parseInt(urlParams.get('id'));
    let groups = JSON.parse(localStorage.getItem('groups') || '[]');
    let group = groups.find(g => g.id === groupId);
    if (!group) window.location.href = 'dashboard.html';

    let balances = {};
    let accepted = group.members.filter(m => m.accepted).map(m => m.user);
    let currentFlagId = null;

    function showToast(msg, isError = false) {
      const toast = document.getElementById('toast');
      document.getElementById('toastMessage').textContent = msg;
      toast.classList.remove('hidden', 'bg-emerald-600', 'bg-red-600');
      toast.classList.add(isError ? 'bg-red-600' : 'bg-emerald-600');
      setTimeout(() => toast.classList.add('hidden'), 3000);
    }

    function toggleMobileMenu() {
      const menu = document.getElementById('mobileMenu');
      const drawer = menu.querySelector('div');
      if (menu.classList.contains('hidden')) {
        menu.classList.remove('hidden');
        setTimeout(() => drawer.style.transform = 'translateX(0)', 10);
      } else {
        drawer.style.transform = 'translateX(100%)';
        setTimeout(() => menu.classList.add('hidden'), 300);
      }
    }

    function logout() {
      localStorage.removeItem('currentUser');
      window.location.href = "index.html";
    }

    function showHelp() {
      alert('Quick tips: Approve expenses with one click, flag for disagreements. Your balance is shown in green if positive.');
    }

    function switchTab(index) {
      document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
      document.getElementById(`content${index}`).classList.remove('hidden');
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active', 'border-b-2', 'border-violet-500'));
      document.getElementById(`tab${index}`).classList.add('active', 'border-b-2', 'border-violet-500');
    }

    function toggleSplitType(type) {
      document.querySelectorAll('.tab-btn[type-btn]').forEach(b => b.classList.remove('bg-zinc-800'));
      document.getElementById(`typeBtn${type}`).classList.add('bg-zinc-800');
      // Logic to hide/show recurrings if needed
    }

    function openAddModal() {
      document.getElementById('addModal').classList.remove('hidden');
    }

    function closeAddModal() {
      document.getElementById('addModal').classList.add('hidden');
    }

    function openRecurringModal() {
      document.getElementById('recurringModal').classList.remove('hidden');
    }

    function closeRecurringModal() {
      document.getElementById('recurringModal').classList.add('hidden');
    }

    function addExpense() {
      const name = document.getElementById('name').value.trim();
      const amount = parseFloat(document.getElementById('amount').value) || 0;
      const date = document.getElementById('date').value;
      if (!name || amount <= 0) {
        showToast('Invalid expense', true);
        return;
      }
      const expense = {id: Date.now(), name, amount, date, addedBy: currentUser, status: 'pending', approvedBy: [], flaggedBy: [], flagRemark: ''};
      group.expenses.push(expense);
      group.total += amount;
      logTimeline(`Expense "${name}" added by ${currentUser}`);
      localStorage.setItem('groups', JSON.stringify(groups));
      closeAddModal();
      renderExpenses();
      renderSummary();
      showToast('Expense added');
    }

    function addRecurring() {
      const name = document.getElementById('recName').value.trim();
      const amount = parseFloat(document.getElementById('recAmount').value) || 0;
      const freq = document.getElementById('recFreq').value;
      const nextDate = document.getElementById('recNextDate').value;
      if (!name || amount <= 0 || !freq || !nextDate) {
        showToast('Invalid recurring', true);
        return;
      }
      if (!group.recurrings) group.recurrings = [];
      group.recurrings.push({name, amount, freq, nextDate});
      logTimeline(`Recurring "${name}" added by ${currentUser}`);
      localStorage.setItem('groups', JSON.stringify(groups));
      closeRecurringModal();
      showToast('Recurring added');
    }

    function approveExpense(id) {
      const exp = group.expenses.find(e => e.id === id);
      if (exp.approvedBy.includes(currentUser)) return;
      exp.approvedBy.push(currentUser);
      if (exp.approvedBy.length === accepted.length - 1) exp.status = 'approved'; // All except adder
      logTimeline(`Expense "${exp.name}" approved by ${currentUser}`);
      localStorage.setItem('groups', JSON.stringify(groups));
      renderExpenses();
      showToast('Approved');
    }

    function openFlagModal(id) {
      currentFlagId = id;
      document.getElementById('flagModal').classList.remove('hidden');
      document.getElementById('flagRemark').focus();
    }

    function closeFlagModal() {
      document.getElementById('flagModal').classList.add('hidden');
      currentFlagId = null;
      document.getElementById('flagRemark').value = '';
      document.getElementById('flagReason').value = '';
    }

    function submitFlag() {
      const exp = group.expenses.find(e => e.id === currentFlagId);
      const reason = document.getElementById('flagReason').value;
      let remark = document.getElementById('flagRemark').value.trim();
      if (reason) remark = reason + (remark ? ': ' + remark : '');
      if (!remark) return showToast('Remark required', true);
      exp.flaggedBy.push(currentUser);
      exp.flagRemark = remark;
      logTimeline(`Expense "${exp.name}" flagged by ${currentUser}: ${remark}`);
      localStorage.setItem('groups', JSON.stringify(groups));
      closeFlagModal();
      renderExpenses();
      showToast('Flagged');
    }

    function renderHeader() {
      const header = document.getElementById('headerInfo');
      let net = balances[currentUser] || 0;
      const netColor = net > 0 ? 'text-green-400' : net < 0 ? 'text-red-400' : 'text-zinc-400';
      header.innerHTML = `
        <div>
          <h1 class="text-5xl font-bold mb-2">${group.title}</h1>
          <p class="text-zinc-400">Total: रू ${group.total.toLocaleString()} • ${accepted.length} members</p>
          <p class="${netColor}">Your net: रू ${net.toLocaleString()}</p>
        </div>
        <div class="flex gap-4">
          <button onclick="sendInvite()" class="bg-white/10 px-6 py-3 rounded-3xl">Invite</button>
          <button onclick="exportPdf()" class="bg-white/10 px-6 py-3 rounded-3xl">Export PDF</button>
          <button onclick="editGroup()" class="bg-white/10 px-6 py-3 rounded-3xl">Edit</button>
          <button onclick="deleteGroup()" class="bg-red-600 px-6 py-3 rounded-3xl">Delete</button>
        </div>
      `;
    }

    function renderExpenses() {
      const container = document.getElementById('expensesList');
      container.innerHTML = '<div class="text-center py-8">Loading...</div>';
      const expenses = group.expenses.sort((a, b) => new Date(b.date) - new Date(a.date));
      container.innerHTML = expenses.map(exp => `
        <div class="bg-zinc-900 rounded-3xl p-6 flex justify-between items-center">
          <div>
            <h3 class="text-xl font-semibold">${exp.name}</h3>
            <p class="text-zinc-400">रू ${exp.amount.toLocaleString()} • ${exp.date} • Added by ${exp.addedBy}</p>
            <div class="flex items-center gap-2 text-sm text-zinc-400">
              <span>${exp.approvedBy.length}/${accepted.length - 1} approved</span>
              ${exp.flaggedBy.length > 0 ? `<i class="fas fa-flag text-red-400" title="${exp.flagRemark}"></i>` : ''}
            </div>
          </div>
          <div class="flex gap-2">
            ${exp.addedBy !== currentUser && !exp.approvedBy.includes(currentUser) ? `
              <button onclick="approveExpense(${exp.id})" class="bg-emerald-600 hover:bg-emerald-500 px-6 py-2 rounded-2xl font-medium group relative">Approve
                <span class="absolute bottom-full mb-2 hidden group-hover:block bg-zinc-800 px-2 py-1 rounded text-sm">Agree with this expense</span>
              </button>
            ` : ''}
            ${!exp.flaggedBy.includes(currentUser) ? `
              <button onclick="openFlagModal(${exp.id})" class="bg-red-600 hover:bg-red-500 px-6 py-2 rounded-2xl font-medium group relative">Flag
                <span class="absolute bottom-full mb-2 hidden group-hover:block bg-zinc-800 px-2 py-1 rounded text-sm">Disagree or note issue</span>
              </button>
            ` : ''}
            ${exp.addedBy === currentUser ? `
              <button onclick="deleteExpense(${exp.id})" class="bg-zinc-600 px-4 py-2 rounded-2xl"><i class="fas fa-trash"></i></button>
            ` : ''}
          </div>
        </div>
      `).join('') || '<p class="text-center text-zinc-400 py-12">No expenses yet</p>';
    }

    function deleteExpense(id) {
      if (!confirm('Delete this expense?')) return;
      group.expenses = group.expenses.filter(e => e.id !== id);
      group.total = group.expenses.reduce((sum, e) => sum + e.amount, 0);
      logTimeline(`Expense deleted by ${currentUser}`);
      localStorage.setItem('groups', JSON.stringify(groups));
      renderExpenses();
      renderSummary();
      showToast('Expense deleted');
    }

    function renderSummary() {
      const container = document.getElementById('summaryContainer');
      const share = group.total / accepted.length;
      balances = {};
      accepted.forEach(u => balances[u] = 0);
      group.expenses.forEach(exp => {
        const share = exp.amount / accepted.length;
        accepted.forEach(u => {
          balances[u] -= share;
        });
        balances[exp.addedBy] += exp.amount;
      });
      container.innerHTML = accepted.map(u => `
        <div class="bg-zinc-900 rounded-3xl p-6 flex justify-between">
          <span class="font-semibold">${u}</span>
          <span class="${balances[u] > 0 ? 'text-emerald-400' : balances[u] < 0 ? 'text-red-400' : 'text-zinc-400'}">Net: रू ${balances[u].toLocaleString()}</span>
        </div>
      `).join('');
      renderHeader(); // Update net in header
    }

    function renderMembers() {
      const container = document.getElementById('membersList');
      container.innerHTML = group.members.map(m => `
        <div class="bg-zinc-900 rounded-3xl p-6 flex justify-between items-center">
          <span>${m.user}</span>
          <span class="${m.accepted ? 'text-emerald-400' : 'text-yellow-400'}">${m.accepted ? 'Accepted' : 'Pending'}</span>
        </div>
      `).join('');
    }

    function logTimeline(action) {
      if (!group.timeline) group.timeline = [];
      group.timeline.push({action, by: currentUser, timestamp: Date.now()});
    }

    function renderTimeline() {
      const container = document.getElementById('timelineList');
      const search = document.getElementById('timelineSearch').value.toLowerCase();
      const filter = document.getElementById('timelineFilter').value;
      let filtered = (group.timeline || []).slice().sort((a,b) => b.timestamp - a.timestamp);
      if (search) filtered = filtered.filter(t => t.action.toLowerCase().includes(search));
      if (filter === 'member') filtered = filtered.filter(t => t.by === currentUser);
      container.innerHTML = filtered.map(t => `
        <div class="bg-zinc-800 p-4 rounded-xl">
          <p>${t.action}</p>
          <p class="text-xs text-zinc-400">By ${t.by} • ${new Date(t.timestamp).toLocaleString()}</p>
        </div>
      `).join('') || '<p class="text-center text-zinc-400 py-12">No activity yet</p>';
    }

    function checkRecurrings() {
      if (!group.recurrings) return;
      const today = new Date();
      group.recurrings.forEach(r => {
        let next = new Date(r.nextDate);
        while (next < today) {
          const expense = {id: Date.now(), name: r.name, amount: r.amount, date: next.toISOString().split('T')[0], addedBy: 'system', status: 'pending', approvedBy: [], flaggedBy: [], flagRemark: ''};
          group.expenses.push(expense);
          group.total += r.amount;
          logTimeline(`Recurring expense "${r.name}" auto-added`);
          next = new Date(next);
          next.setDate(next.getDate() + (r.freq === 'weekly' ? 7 : 30));
          r.nextDate = next.toISOString().split('T')[0];
        }
      });
      localStorage.setItem('groups', JSON.stringify(groups));
    }

    function sendInvite() {
      const username = document.getElementById('inviteUsername').value.trim();
      if (!username) return showToast('Enter username', true);
      let allInvites = JSON.parse(localStorage.getItem('allInvites') || '{}');
      if (!allInvites[username]) allInvites[username] = [];
      allInvites[username].push({id: group.id, title: group.title, from: currentUser});
      localStorage.setItem('allInvites', JSON.stringify(allInvites));
      logTimeline(`Invite sent to ${username}`);
      showToast(`Invite sent to ${username}`);
      document.getElementById('inviteUsername').value = '';
      if (Notification.permission === 'granted') {
        new Notification('Splitly: Invite Sent', {body: `Invited ${username} to ${group.title}`});
      }
    }

    function exportPdf() {
      html2pdf(document.body);
    }

    function editGroup() {
      showToast('Edit functionality coming soon!');
    }

    function deleteGroup() {
      if (!confirm('Delete this group?')) return;
      groups = groups.filter(g => g.id !== groupId);
      localStorage.setItem('groups', JSON.stringify(groups));
      window.location.href = 'dashboard.html';
    }

    // Initial load
    function init() {
      checkRecurrings();
      renderHeader();
      renderExpenses();
      renderSummary();
      renderMembers();
      renderTimeline();
    }
    init();

    // Listeners
    document.getElementById('timelineSearch').addEventListener('input', renderTimeline);
    document.getElementById('timelineFilter').addEventListener('change', renderTimeline);
    document.addEventListener('keydown', e => {
      if (e.key === "Escape") {
        closeFlagModal();
        closeAddModal();
        closeRecurringModal();
      }
    });
  </script>
</body>
</html>
