<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard • Splitly</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body class="bg-zinc-950 text-white">

  <!-- REVISED PREMIUM NAVBAR WITH SLIDING MOBILE MENU -->
  <nav class="fixed top-0 w-full bg-zinc-950/95 backdrop-blur-2xl border-b border-white/10 z-50">
    <div class="max-w-7xl mx-auto px-6 py-5 flex justify-between items-center">
      
      <!-- Logo -->
      <a href="index.html" class="flex items-center gap-3">
        <i class="fas fa-handshake text-4xl text-violet-500"></i>
        <span class="text-3xl font-bold tracking-tighter">Splitly</span>
      </a>

      <!-- Desktop Menu -->
      <div class="hidden md:flex gap-10 text-sm font-medium">
        <a href="index.html" class="hover:text-violet-400 transition">Home</a>
        <a href="dashboard.html" class="text-violet-400 font-semibold">Dashboard</a>
        <a href="invites.html" class="hover:text-violet-400 transition">Invites</a>
        <a href="notifications.html" class="hover:text-violet-400 transition">Notifications</a>
      </div>

      <!-- Desktop Right Side -->
      <div class="hidden md:flex items-center gap-6">
        <span id="currentUserDisplay" class="text-sm font-medium"></span>
        <button onclick="logout()" class="text-xs bg-white/10 px-5 py-2 rounded-2xl hover:bg-white/20 transition">Logout</button>
      </div>

      <!-- Mobile Hamburger -->
      <button onclick="toggleMobileMenu()" class="md:hidden text-3xl">
        <i class="fas fa-bars"></i>
      </button>
    </div>

    <!-- MOBILE SLIDING DRAWER -->
    <div id="mobileMenu" class="hidden fixed inset-0 bg-black/70 z-[60] flex justify-end">
      <div onclick="event.stopImmediatePropagation()" 
           class="bg-zinc-900 w-80 h-full shadow-2xl transform translate-x-full transition-transform duration-300 flex flex-col">
        
        <!-- Header -->
        <div class="p-6 border-b border-white/10 flex items-center justify-between">
          <div class="flex items-center gap-3">
            <i class="fas fa-handshake text-3xl text-violet-500"></i>
            <span class="text-2xl font-bold">Splitly</span>
          </div>
          <button onclick="toggleMobileMenu()" class="text-3xl text-zinc-400 hover:text-white">
            <i class="fas fa-times"></i>
          </button>
        </div>

        <!-- Menu Links -->
        <div class="flex-1 p-6 space-y-6 text-lg">
          <a href="index.html" onclick="toggleMobileMenu()" class="flex items-center gap-4 hover:text-violet-400 transition">
            <i class="fas fa-home w-6"></i> Home
          </a>
          <a href="dashboard.html" onclick="toggleMobileMenu()" class="flex items-center gap-4 hover:text-violet-400 transition">
            <i class="fas fa-chart-line w-6"></i> Dashboard
          </a>
          <a href="invites.html" onclick="toggleMobileMenu()" class="flex items-center gap-4 hover:text-violet-400 transition">
            <i class="fas fa-envelope w-6"></i> Invites
          </a>
          <a href="notifications.html" onclick="toggleMobileMenu()" class="flex items-center gap-4 hover:text-violet-400 transition">
            <i class="fas fa-bell w-6"></i> Notifications
          </a>
        </div>

        <!-- User Info & Logout -->
        <div class="p-6 border-t border-white/10">
          <div class="flex items-center gap-3 mb-6">
            <i class="fas fa-user-circle text-4xl text-violet-400"></i>
            <div>
              <p id="mobileUserName" class="font-medium"></p>
              <p class="text-xs text-zinc-400">Logged in</p>
            </div>
          </div>
          <button onclick="logout()" 
                  class="w-full py-4 bg-red-600/80 hover:bg-red-600 rounded-3xl font-medium transition">
            Logout
          </button>
        </div>
      </div>
    </div>
  </nav>

  <!-- TOAST -->
  <div id="toast" class="hidden fixed bottom-6 right-6 bg-emerald-600 text-white px-6 py-4 rounded-3xl shadow-2xl flex items-center gap-3 z-50">
    <i class="fas fa-check-circle"></i>
    <span id="toastMessage" class="font-medium"></span>
  </div>

  <!-- Create Group Modal -->
  <div id="createModal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
    <div class="bg-zinc-900 rounded-3xl p-10 shadow-2xl max-w-lg w-full mx-4">
      <h1 class="text-3xl font-bold mb-8">Create New Group</h1>
      <div class="space-y-8">
        <div>
          <label class="block text-sm text-zinc-400 mb-2">Group Name (e.g. Thamel Flatmates)</label>
          <input id="title" type="text" placeholder="Thamel Flatmates" class="w-full bg-zinc-800 border border-white/10 rounded-2xl px-6 py-4 focus:outline-none focus:border-violet-500 text-lg">
        </div>
        <div>
          <label class="block text-sm text-zinc-400 mb-2">Initial Amount (रू) – optional</label>
          <input id="total" type="number" placeholder="0" class="w-full bg-zinc-800 border border-white/10 rounded-2xl px-6 py-4 focus:outline-none focus:border-violet-500 text-lg">
        </div>
        <button onclick="createGroup()" class="w-full bg-violet-600 hover:bg-violet-500 py-5 rounded-3xl font-semibold text-lg transition">Create Group</button>
        <button onclick="closeCreateModal()" class="w-full py-4 rounded-3xl border border-white/20 font-medium">Cancel</button>
      </div>
    </div>
  </div>

  <div class="max-w-7xl mx-auto px-6 pt-28 pb-12">
    <!-- Header -->
    <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
      <div>
        <h1 class="text-4xl md:text-5xl font-bold">Welcome, <span id="welcomeUser"></span></h1>
        <p class="text-zinc-400 mt-2">Manage your groups and splits effortlessly.</p>
      </div>
      <div class="flex items-center gap-4 w-full md:w-auto">
        <input id="searchInput" type="text" placeholder="Search groups..." class="flex-1 bg-zinc-800 border border-white/10 rounded-2xl px-6 py-3 focus:outline-none focus:border-violet-500">
        <button onclick="openCreateModal()" class="bg-violet-600 hover:bg-violet-500 px-6 py-3 rounded-3xl font-semibold text-base transition">+ New Group</button>
      </div>
    </div>

    <!-- Stats Overview -->
    <div id="statsRow" class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-12"></div>

    <!-- Groups Container -->
    <div id="groupsContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
  </div>

  <script>
    // Mobile Menu Functions
    function toggleMobileMenu() {
      const menu = document.getElementById('mobileMenu');
      const drawer = menu.querySelector('div');
      
      if (menu.classList.contains('hidden')) {
        menu.classList.remove('hidden');
        setTimeout(() => drawer.style.transform = 'translateX(0)', 10);
      } else {
        drawer.style.transform = 'translateX(100%)';
        setTimeout(() => menu.classList.add('hidden'), 300);
      }
    }

    function logout() {
      localStorage.removeItem('currentUser');
      window.location.href = "index.html";
    }

    // Show current user
    const currentUser = localStorage.getItem('currentUser') || "Guest";
    document.querySelectorAll('#currentUserDisplay, #mobileUserName, #welcomeUser').forEach(el => {
      el.textContent = currentUser;
    });

    function showToast(msg) {
      const toast = document.getElementById('toast');
      document.getElementById('toastMessage').textContent = msg;
      toast.classList.remove('hidden');
      setTimeout(() => toast.classList.add('hidden'), 3000);
    }

    function loadStats() {
      let groups = JSON.parse(localStorage.getItem('groups') || '[]');
      const myGroups = groups.filter(g => g.members.some(m => m.user === currentUser && m.accepted));
      
      const totalGroups = myGroups.length;
      const totalSpending = myGroups.reduce((sum, g) => sum + g.total, 0);
      const totalMembers = myGroups.reduce((sum, g) => sum + g.members.filter(m => m.accepted).length, 0);

      const stats = [
        { label: 'Total Groups', value: totalGroups, icon: 'fa-users' },
        { label: 'Total Spending', value: `रू ${totalSpending.toLocaleString()}`, icon: 'fa-wallet' },
        { label: 'Active Members', value: totalMembers, icon: 'fa-user-friends' }
      ];

      const container = document.getElementById('statsRow');
      container.innerHTML = stats.map(stat => `
        <div class="bg-zinc-900 rounded-3xl p-6 shadow-lg hover:shadow-xl transition-shadow">
          <div class="flex items-center gap-3 mb-2">
            <i class="fas ${stat.icon} text-2xl text-violet-400"></i>
            <span class="text-sm text-zinc-400">${stat.label}</span>
          </div>
          <p class="text-3xl font-bold">${stat.value}</p>
        </div>
      `).join('');
    }

    function loadGroups(search = '') {
      let groups = JSON.parse(localStorage.getItem('groups') || '[]');
      const container = document.getElementById('groupsContainer');
      container.innerHTML = '';

      const myGroups = groups.filter(g => 
        g.members.some(m => m.user === currentUser && m.accepted) &&
        g.title.toLowerCase().includes(search.toLowerCase())
      );

      if (myGroups.length === 0) {
        container.innerHTML = `
          <div class="col-span-3 bg-zinc-900 rounded-3xl p-16 text-center shadow-lg">
            <i class="fas fa-folder-open text-8xl text-zinc-600 mb-6"></i>
            <p class="text-2xl font-semibold text-zinc-300 mb-4">No groups found</p>
            <p class="text-zinc-400 mb-6">Get started by creating your first group.</p>
            <button onclick="openCreateModal()" class="bg-violet-600 hover:bg-violet-500 px-8 py-4 rounded-3xl font-semibold">Create Group</button>
          </div>`;
        return;
      }

      myGroups.forEach(group => {
        const card = document.createElement('div');
        card.className = "bg-zinc-900 rounded-3xl p-8 shadow-lg hover:shadow-xl hover:scale-[1.02] transition-all cursor-pointer";
        card.innerHTML = `
          <div class="flex justify-between items-start mb-4">
            <div>
              <h3 class="font-bold text-2xl">${group.title}</h3>
              <p class="text-sm text-zinc-400">Created by ${group.creator} • Last updated: ${new Date(group.id).toLocaleDateString()}</p>
            </div>
            <div class="text-right">
              <span class="bg-emerald-500/10 text-emerald-400 text-xs px-4 py-1 rounded-full">${group.members.filter(m => m.accepted).length} members</span>
            </div>
          </div>
          <div class="flex items-center justify-between">
            <p class="text-3xl font-bold text-violet-400">रू ${group.total.toLocaleString()}</p>
            <div class="flex gap-2">
              <button onclick="editGroup(${group.id})" class="text-zinc-400 hover:text-violet-400"><i class="fas fa-edit"></i></button>
              <button onclick="deleteGroup(${group.id})" class="text-zinc-400 hover:text-red-400"><i class="fas fa-trash"></i></button>
            </div>
          </div>
        `;
        card.onclick = (e) => {
          if (!e.target.closest('button')) window.location.href = `split-detail.html?id=${group.id}`;
        };
        container.appendChild(card);
      });
    }

    function deleteGroup(id) {
      if (!confirm('Are you sure? This will delete the group permanently.')) return;
      let groups = JSON.parse(localStorage.getItem('groups') || '[]');
      groups = groups.filter(g => g.id !== id);
      localStorage.setItem('groups', JSON.stringify(groups));
      loadGroups(document.getElementById('searchInput').value);
      loadStats();
      showToast('Group deleted');
    }

    // Placeholder for edit (expand as needed)
    function editGroup(id) {
      showToast('Edit functionality coming soon!');
    }

    function openCreateModal() {
      document.getElementById('createModal').classList.remove('hidden');
    }

    function closeCreateModal() {
      document.getElementById('createModal').classList.add('hidden');
    }

    function createGroup() {
      const title = document.getElementById('title').value.trim() || "New Flatmates Group";
      const total = parseFloat(document.getElementById('total').value) || 0;
      
      let groups = JSON.parse(localStorage.getItem('groups') || '[]');
      const newGroup = {
        id: Date.now(),
        title,
        total,
        creator: currentUser,
        members: [{ user: currentUser, accepted: true }],
        expenses: [],
        notifications: []
      };
      groups.push(newGroup);
      localStorage.setItem('groups', JSON.stringify(groups));
      closeCreateModal();
      loadGroups(document.getElementById('searchInput').value);
      loadStats();
      showToast("Group created successfully!");
    }

    // Search listener
    document.getElementById('searchInput').addEventListener('input', (e) => loadGroups(e.target.value));

    // Initial load
    loadStats();
    loadGroups();
  </script>
</body>
</html>
