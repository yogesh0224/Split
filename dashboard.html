<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard • Splitly</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body class="bg-zinc-950 text-white">
  <!-- NAVBAR (exact match to your screenshot) -->
  <nav class="fixed top-0 w-full bg-zinc-950/95 backdrop-blur-2xl border-b border-white/10 z-50">
    <div class="max-w-7xl mx-auto px-6 py-5 flex justify-between items-center">
      <a href="index.html" class="flex items-center gap-3">
        <i class="fas fa-handshake text-4xl text-violet-500"></i>
        <span class="text-3xl font-bold tracking-tighter">Splitly</span>
      </a>
      
      <div class="hidden md:flex gap-10 text-sm font-medium">
        <a href="index.html" class="hover:text-violet-400">Home</a>
        <a href="dashboard.html" class="text-violet-400 font-semibold">Dashboard</a>
        <a href="invites.html" class="hover:text-violet-400">Invites</a>
      </div>

      <div class="flex items-center gap-6">
        <span id="currentUserDisplay" class="text-sm font-medium"></span>
        <a href="create-split.html" 
           class="bg-violet-600 hover:bg-violet-500 px-6 py-3 rounded-3xl font-semibold flex items-center gap-2 transition">
          <i class="fas fa-plus"></i> New Split
        </a>
        <button onclick="logout()" 
                class="text-xs bg-white/10 px-5 py-2 rounded-2xl hover:bg-white/20 transition">Logout</button>
      </div>
    </div>
  </nav>

  <div class="max-w-7xl mx-auto px-6 pt-28 pb-12">
    <div class="flex justify-between items-end mb-10">
      <h1 class="text-5xl font-bold">Your Splits</h1>
    </div>

    <div id="splitsContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
  </div>

  <script>
    const currentUser = localStorage.getItem('currentUser') || "yogesh";
    document.getElementById('currentUserDisplay').textContent = currentUser;

    function loadSplits() {
      let splits = JSON.parse(localStorage.getItem('splits') || '[]');
      const container = document.getElementById('splitsContainer');
      container.innerHTML = '';

      const mySplits = splits.filter(s => 
        s.creator === currentUser || s.members.some(m => m.user === currentUser && m.accepted)
      );

      if (mySplits.length === 0) {
        container.innerHTML = `<p class="col-span-3 text-center text-zinc-400 py-20 text-xl">No splits yet.<br>Create your first one above!</p>`;
        return;
      }

      mySplits.forEach(split => {
        const card = document.createElement('div');
        card.className = "bg-zinc-900 rounded-3xl p-8 hover:scale-105 transition cursor-pointer";
        card.innerHTML = `
          <h3 class="font-bold text-2xl mb-2">${split.title}</h3>
          <p class="text-4xl font-bold text-violet-400">रू ${split.total}</p>
          <p class="text-zinc-400 mt-4">${split.members.filter(m => m.accepted).length} members • by ${split.creator}</p>
        `;
        card.onclick = () => window.location.href = `split-detail.html?id=${split.id}`;
        container.appendChild(card);
      });
    }

    function logout() {
      localStorage.removeItem('currentUser');
      window.location.href = "index.html";
    }

    loadSplits();
  </script>
</body>
</html>
