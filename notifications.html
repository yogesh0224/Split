<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Notifications • Splitly</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body class="bg-zinc-950 text-white">

  <!-- NAVBAR -->
  <nav class="fixed top-0 w-full bg-zinc-950/95 backdrop-blur-2xl border-b border-white/10 z-50">
    <div class="max-w-7xl mx-auto px-6 py-5 flex justify-between items-center">
      <a href="index.html" class="flex items-center gap-3">
        <i class="fas fa-handshake text-4xl text-violet-500"></i>
        <span class="text-3xl font-bold tracking-tighter">Splitly</span>
      </a>
      <a href="dashboard.html" class="text-sm font-medium">← Dashboard</a>
      <button onclick="toggleMobileMenu()" class="md:hidden text-3xl"><i class="fas fa-bars"></i></button>
    </div>

    <!-- Mobile Sliding Menu -->
    <div id="mobileMenu" class="hidden fixed inset-0 bg-black/70 z-[60] flex justify-end">
      <div onclick="event.stopImmediatePropagation()" class="bg-zinc-900 w-80 h-full shadow-2xl transform translate-x-full transition-transform duration-300 flex flex-col">
        <div class="p-6 border-b border-white/10 flex justify-between items-center">
          <div class="flex items-center gap-3">
            <i class="fas fa-handshake text-3xl text-violet-500"></i>
            <span class="text-2xl font-bold">Splitly</span>
          </div>
          <button onclick="toggleMobileMenu()" class="text-3xl text-zinc-400"><i class="fas fa-times"></i></button>
        </div>
        <div class="flex-1 p-6 space-y-6 text-lg">
          <a href="index.html" onclick="toggleMobileMenu()" class="flex items-center gap-4">Home</a>
          <a href="dashboard.html" onclick="toggleMobileMenu()" class="flex items-center gap-4">Dashboard</a>
          <a href="invites.html" onclick="toggleMobileMenu()" class="flex items-center gap-4">Invites</a>
        </div>
        <div class="p-6 border-t border-white/10">
          <button onclick="logout()" class="w-full py-4 bg-red-600 rounded-3xl font-medium">Logout</button>
        </div>
      </div>
    </div>
  </nav>

  <div class="max-w-4xl mx-auto px-6 pt-28">
    <h1 class="text-5xl font-bold mb-10">Notifications</h1>
    <div id="notifList" class="space-y-6"></div>
  </div>

  <script>
    function toggleMobileMenu() {
      const menu = document.getElementById('mobileMenu');
      const drawer = menu.querySelector('div');
      if (menu.classList.contains('hidden')) {
        menu.classList.remove('hidden');
        setTimeout(() => drawer.style.transform = 'translateX(0)', 10);
      } else {
        drawer.style.transform = 'translateX(100%)';
        setTimeout(() => menu.classList.add('hidden'), 300);
      }
    }

    function logout() {
      localStorage.removeItem('currentUser');
      window.location.href = "index.html";
    }

    function loadNotifications() {
      const currentUser = localStorage.getItem('currentUser');
      let groups = JSON.parse(localStorage.getItem('groups') || '[]');
      let allInvites = JSON.parse(localStorage.getItem('allInvites') || '{}');
      const container = document.getElementById('notifList');
      container.innerHTML = '';

      let notifs = [];

      // Pending invites
      const myInvites = allInvites[currentUser] || [];
      myInvites.forEach(invite => {
        notifs.push({
          type: 'invite',
          message: `<strong>${invite.from}</strong> invited you to <span class="text-violet-400">"${invite.title}"</span>`,
          time: 'Just now',
          action: `<button onclick="window.location.href='invites.html'" class="text-xs bg-violet-600 px-6 py-3 rounded-3xl">View Invites</button>`
        });
      });

      // Expenses needing approval
      groups.forEach(group => {
        const isMember = group.members.some(m => m.user === currentUser && m.accepted);
        if (!isMember) return;

        group.expenses.forEach(exp => {
          if (exp.status === 'pending' && !exp.approvedBy?.includes(currentUser) && exp.addedBy !== currentUser) {
            notifs.push({
              type: 'expense',
              message: `<strong>${exp.addedBy}</strong> added <span class="text-emerald-400">"${exp.name}"</span> (रू ${exp.amount}) in <span class="text-violet-400">"${group.title}"</span>`,
              time: exp.date,
              action: `<button onclick="window.location.href='split-detail.html?id=${group.id}'" class="text-xs bg-emerald-600 px-6 py-3 rounded-3xl">Approve</button>`
            });
          }
        });
      });

      if (notifs.length === 0) {
        container.innerHTML = `
          <div class="bg-zinc-900 rounded-3xl p-16 text-center">
            <i class="fas fa-bell-slash text-7xl text-zinc-600 mb-6"></i>
            <p class="text-2xl text-zinc-400">All caught up!</p>
          </div>`;
        return;
      }

      container.innerHTML = notifs.map(n => `
        <div class="bg-zinc-900 rounded-3xl p-8 flex justify-between items-center">
          <div>
            <p class="font-medium">${n.message}</p>
            <p class="text-xs text-zinc-400 mt-1">${n.time}</p>
          </div>
          ${n.action}
        </div>
      `).join('');

      // New: Push notification
      if (notifs.length > 0 && 'Notification' in window && Notification.permission === 'granted') {
        new Notification('Splitly: New Notifications', {body: `${notifs.length} unread notifications`});
      }
    }

    loadNotifications();
  </script>
</body>
</html>
